<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独自フォントIMEシステム</title>
    <!-- Tailwind CSS (Aesthetics & Layout) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 指定された独自のフォントを読み込む設定 */
        @font-face {
            font-family: 'uswinf';
            src: url('https://ec2045.github.io/USWINF/USWINF2.otf') format('opentype');
            font-display: swap;
        }

        /* 変換候補や入力エリアの中で、指定フォントを適用するクラス */
        .custom-font {
            font-family: 'uswinf', 'Segoe UI Symbol', 'Apple Color Emoji', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- ヘッダー -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-white">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>⌨️</span> 独自文字 IMEシミュレータ (高速版)
            </h1>
            <p class="text-sm opacity-90 mt-1">
                ローマ字を連続入力して、Space / Tabキーや数字キーでサクサク快適に変換・確定できます。
            </p>
        </div>

        <!-- コントロールパネル -->
        <div class="p-6 border-b border-gray-100 bg-gray-50 flex flex-wrap items-center justify-between gap-4">
            <!-- 自動変換設定 -->
            <div class="flex items-center gap-3">
                <span class="text-sm font-medium text-gray-700">自動変換 (完全一致時):</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="autoConvertToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    <span id="autoConvertStatus" class="ml-2 text-xs font-semibold text-gray-500 uppercase">OFF</span>
                </label>
            </div>

            <!-- ヘルプ簡易表示 -->
            <div class="text-xs text-gray-500 bg-white px-3 py-1.5 rounded-lg border border-gray-200">
                <span class="font-bold text-blue-600">【高速操作】</span> 
                [Space] / [Tab]：選択中の候補で即確定 | [1]〜[9]：数字の候補で即確定
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div class="p-6 space-y-6">
            
            <!-- IME 入力エリア (模擬テキストエリア) -->
            <div class="relative">
                <label for="editor" class="block text-sm font-medium text-gray-700 mb-2">文章作成エリア</label>
                
                <!-- 実際にテキストを入力・編集するコンテナ。IMEのポッポアップ候補を制御しやすくするため、div contenteditableを使用 -->
                <div id="editor" 
                     contenteditable="true" 
                     class="w-full min-h-[120px] p-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none text-lg custom-font bg-white transition-all whitespace-pre-wrap"
                     placeholder="ここにローマ字を入力してください（例: mini, esa, m）..."></div>
                
                <!-- 変換候補のフローティングツールチップ -->
                <div id="candidatePopup" class="absolute z-10 hidden bg-white border border-gray-200 rounded-lg shadow-xl p-1 min-w-[200px]">
                    <div class="text-[10px] text-gray-400 px-2 py-0.5 border-b border-gray-100 flex justify-between gap-4">
                        <span>変換候補</span>
                        <span>[Space / Tab] 確定</span>
                    </div>
                    <div id="candidateList" class="flex flex-col max-h-56 overflow-y-auto">
                        <!-- 候補がここに動的に生成される -->
                    </div>
                </div>
            </div>

            <!-- コピーなどのアクションボタン -->
            <div class="flex justify-end gap-3">
                <button id="clearBtn" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                    クリア
                </button>
                <button id="copyBtn" class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-md shadow-blue-100 flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    テキストをコピー
                </button>
            </div>

            <!-- コピー成功メッセージ用通知 -->
            <div id="toast" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-4 py-2.5 rounded-xl shadow-lg text-sm flex items-center gap-2 transition-all duration-300">
                <span>📋</span> コピーしました！
            </div>

            <!-- 辞書マップの視覚化 -->
            <div class="bg-blue-50/50 rounded-xl p-4 border border-blue-100">
                <h3 class="text-sm font-semibold text-blue-900 mb-3 flex items-center gap-1.5">
                    <span>📖</span> 登録されている変換パターン一覧
                </h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-2 text-xs">
                    <!-- JavaScriptで辞書から動的生成します -->
                    <div id="dictionaryGrid" class="contents"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- フッター -->
    <div class="mt-6 text-center text-xs text-gray-400">
        <p>※ 実際の変換には「<span class="font-semibold">https://example.com/font.otf</span>」が正しく配信されている必要があります。</p>
    </div>

    <script>
        // 1. 変換用マッピング辞書データの定義
        const dictionary = [
            { key: 'ni', char: '󰀁' },
            { key: 'kai', char: '󰀂' },
            { key: 'esa', char: '󰀃' },
            { key: 'pa', char: '󰀄' },
            { key: 'mi', char: '󰀅' },
            { key: 'ha', char: '󰀆' },
            { key: 'ke', char: '󰀇' },
            { key: 'mai', char: '󰀈' },
            { key: 'iam', char: '󰀉' },
            { key: 'ne', char: '󰀊' },
            { key: 'he', char: '󰀋' },
            { key: 'apa', char: '󰀌' },
            { key: 'gi', char: '󰀍' },
            { key: 'chu', char: '󰁟' },
            { key: 'o', char: '󰁠' },
            { key: 'ka', char: '󰁡' },
            { key: 'va', char: '󰁢' },
            { key: 'asu', char: '󰁣' },
            { key: 'ri', char: '󰁤' }
        ];

        // 2. DOM要素の取得
        const editor = document.getElementById('editor');
        const candidatePopup = document.getElementById('candidatePopup');
        const candidateList = document.getElementById('candidateList');
        const dictionaryGrid = document.getElementById('dictionaryGrid');
        const autoConvertToggle = document.getElementById('autoConvertToggle');
        const autoConvertStatus = document.getElementById('autoConvertStatus');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');

        // 3. 状態管理変数
        let currentInputBuffer = ""; // 現在変換処理の対象になっている半角英字バッファ
        let activeCandidates = [];   // 現在の入力に対応する候補一覧
        let selectedCandidateIndex = 0; // 現在選択中の候補インデックス (常に0番目を初期選択に)
        let isAutoConvertOn = false; // 自動変換フラグ（初期値：OFF）

        // 4. 初期化処理
        window.addEventListener('DOMContentLoaded', () => {
            renderDictionary();
            editor.focus();
            
            // プレースホルダーの擬似制御
            if (editor.textContent.trim() === "") {
                editor.innerHTML = ""; // 空白バグ防止
            }
        });

        // 5. 辞書一覧の描画
        function renderDictionary() {
            dictionaryGrid.innerHTML = '';
            dictionary.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'bg-white p-2 rounded-lg border border-gray-200 flex justify-between items-center shadow-sm';
                itemEl.innerHTML = `
                    <span class="font-mono text-gray-500 font-bold">${item.key}</span>
                    <span class="custom-font text-lg text-blue-600 font-semibold">${item.char}</span>
                `;
                dictionaryGrid.appendChild(itemEl);
            });
        }

        // 6. トグルスイッチ変更イベント
        autoConvertToggle.addEventListener('change', (e) => {
            isAutoConvertOn = e.target.checked;
            autoConvertStatus.textContent = isAutoConvertOn ? "ON" : "OFF";
            autoConvertStatus.className = isAutoConvertOn 
                ? "ml-2 text-xs font-semibold text-blue-600" 
                : "ml-2 text-xs font-semibold text-gray-500";
            editor.focus();
        });

        // 7. 入力バッファから候補を探索（連続変換・分割マッチング含む）
        function getCandidates(input) {
            if (!input) return [];
            input = input.toLowerCase();
            const candidates = [];

            // (1) 単語の前方一致（従来の挙動：入力途中をサポート）
            const prefixMatches = dictionary.filter(item => item.key.startsWith(input));
            prefixMatches.forEach(item => {
                candidates.push({
                    char: item.char,
                    key: item.key,
                    type: '単独'
                });
            });

            // (2) 連続変換の探索 (例: mini -> mi + ni -> 󰀅󰀁)
            const combinations = [];
            
            function dfs(remaining, path) {
                if (remaining === "") {
                    combinations.push(path);
                    return;
                }
                
                let matched = false;
                // 最大10文字までキーを探索
                for (let len = Math.min(remaining.length, 10); len >= 1; len--) {
                    const part = remaining.substring(0, len);
                    const matches = dictionary.filter(item => item.key === part);
                    
                    if (matches.length > 0) {
                        matched = true;
                        for (const m of matches) {
                            dfs(remaining.substring(len), [...path, { char: m.char, key: m.key }]);
                        }
                    }
                }
                
                // どの辞書キーにもマッチしない部分がある場合、1文字進めてそのまま残す（フォールバック）
                if (!matched) {
                    dfs(remaining.substring(1), [...path, { char: remaining[0], key: remaining[0] }]);
                }
            }

            dfs(input, []);

            // 探索結果を整形して追加
            combinations.forEach(path => {
                // 最低1つは変換されているもののみ対象とする
                const hasConverted = path.some(p => p.char !== p.key);
                if (!hasConverted) return;

                const combinedChar = path.map(p => p.char).join('');
                const combinedKey = path.map(p => p.key).join('');
                
                // 重複がなければ候補に追加
                if (!candidates.some(c => c.char === combinedChar)) {
                    candidates.push({
                        char: combinedChar,
                        key: combinedKey,
                        type: '連続'
                    });
                }
            });

            return candidates;
        }

        // 8. 候補ポップアップの位置計算と表示
        function showPopupAtSelection() {
            const selection = window.getSelection();
            if (selection.rangeCount === 0) return;

            const range = selection.getRangeAt(0).cloneRange();
            const rects = range.getClientRects();
            
            if (rects.length > 0) {
                const rect = rects[0];
                const editorRect = editor.getBoundingClientRect();

                let topPosition = rect.bottom - editorRect.top + editor.scrollTop + 8;
                let leftPosition = rect.left - editorRect.left + editor.scrollLeft;

                candidatePopup.style.top = `${topPosition}px`;
                candidatePopup.style.left = `${leftPosition}px`;
                candidatePopup.classList.remove('hidden');
            }
        }

        // 9. ポップアップを非表示にする
        function hidePopup() {
            candidatePopup.classList.add('hidden');
            selectedCandidateIndex = 0;
            activeCandidates = [];
        }

        // 10. 候補リストをレンダリングする
        function renderCandidates() {
            candidateList.innerHTML = '';
            
            if (activeCandidates.length === 0) {
                hidePopup();
                return;
            }

            activeCandidates.forEach((candidate, index) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `w-full text-left px-3 py-1.5 flex items-center justify-between text-sm transition-colors ${
                    index === selectedCandidateIndex 
                    ? 'bg-blue-100 text-blue-900 font-semibold' 
                    : 'hover:bg-gray-50 text-gray-700'
                }`;
                
                btn.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-gray-400 font-mono w-4">${index + 1}</span>
                        <span class="custom-font text-base font-medium">${candidate.char}</span>
                    </div>
                    <span class="text-[10px] text-gray-400 font-mono bg-gray-100 px-1.5 py-0.5 rounded">${candidate.type}</span>
                `;

                // クリックして即選択確定できるようにする
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    selectCandidate(index);
                });

                candidateList.appendChild(btn);
            });

            showPopupAtSelection();
        }

        // 11. 指定したインデックスの候補で入力を置換・確定する
        function selectCandidate(index) {
            if (index < 0 || index >= activeCandidates.length) return;
            const chosen = activeCandidates[index];
            insertCharacter(chosen.char);
            hidePopup();
        }

        // 12. 文字列をエディタのカーソル位置に挿入する共通処理
        function insertCharacter(char) {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            
            // 現在の入力中バッファ（英字テキスト）を削除する
            range.setStart(range.startContainer, Math.max(0, range.startOffset - currentInputBuffer.length));
            range.deleteContents();

            // 新しい文字を挿入
            const textNode = document.createTextNode(char);
            range.insertNode(textNode);

            // カーソルを挿入した文字の直後に移動させる
            range.setStartAfter(textNode);
            range.setEndAfter(textNode);
            selection.removeAllRanges();
            selection.addRange(range);

            // バッファをリセット
            currentInputBuffer = "";
        }

        // 13. エディタへのキー入力処理（メインのIME制御ロジック）
        editor.addEventListener('keydown', (e) => {
            const isPopupVisible = !candidatePopup.classList.contains('hidden');

            // 1) Space / Tabキーによる「即確定」
            if (e.key === ' ' || e.code === 'Space' || e.key === 'Tab') {
                if (currentInputBuffer.length > 0) {
                    e.preventDefault(); // 空白挿入・タブフォーカス移動を抑止
                    
                    if (isPopupVisible && activeCandidates.length > 0) {
                        // 現在選択されている候補で即確定！
                        selectCandidate(selectedCandidateIndex);
                    } else {
                        // 候補が見つかれば確定、なければ通常の空白・タブを挿入
                        const candidates = getCandidates(currentInputBuffer);
                        if (candidates.length > 0) {
                            insertCharacter(candidates[0].char);
                        } else {
                            insertCharacter(e.key === 'Tab' ? '\t' : ' ');
                        }
                    }
                    return;
                }
            }

            // 2) Enterキーの処理
            if (e.key === 'Enter') {
                if (isPopupVisible && activeCandidates.length > 0) {
                    e.preventDefault();
                    // 現在選択されている候補で確定
                    selectCandidate(selectedCandidateIndex);
                } else {
                    currentInputBuffer = "";
                }
                return;
            }

            // 3) 数字キー (1〜9) でのショートカット即確定
            if (isPopupVisible && /^[1-9]$/.test(e.key)) {
                const index = parseInt(e.key, 10) - 1;
                if (index < activeCandidates.length) {
                    e.preventDefault();
                    selectCandidate(index);
                    return;
                }
            }

            // 4) Backspaceキーの処理
            if (e.key === 'Backspace') {
                if (currentInputBuffer.length > 0) {
                    currentInputBuffer = currentInputBuffer.slice(0, -1);
                    updateIMEState();
                }
                return;
            }

            // 5) Escapeキーでポップアップを閉じる
            if (e.key === 'Escape') {
                hidePopup();
                return;
            }

            // 6) 矢印キー（上下）で候補を選択
            if (isPopupVisible) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedCandidateIndex = (selectedCandidateIndex + 1) % activeCandidates.length;
                    renderCandidates();
                    return;
                }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedCandidateIndex = (selectedCandidateIndex - 1 + activeCandidates.length) % activeCandidates.length;
                    renderCandidates();
                    return;
                }
            }

            // 7) 通常のローマ字入力（a-zのみ対象）
            if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
                currentInputBuffer += e.key;
                
                // 自動変換がONで、かつ完全一致するキーが辞書にあるか確認
                if (isAutoConvertOn) {
                    const exactMatch = dictionary.find(item => item.key === currentInputBuffer.toLowerCase());
                    if (exactMatch) {
                        e.preventDefault();
                        insertCharacter(exactMatch.char);
                        hidePopup();
                        return;
                    }
                }

                // 通常のバッファ更新処理
                setTimeout(() => {
                    updateIMEState();
                }, 10);
            } else {
                // 英字以外が入力されたらバッファを確定（リセット）
                currentInputBuffer = "";
                hidePopup();
            }
        });

        // エディタをクリックしたときに、バッファをリセットしてポップアップを消す
        editor.addEventListener('click', () => {
            currentInputBuffer = "";
            hidePopup();
        });

        // 14. 入力バッファを元に状態を更新する
        function updateIMEState() {
            if (currentInputBuffer.length === 0) {
                hidePopup();
                return;
            }

            activeCandidates = getCandidates(currentInputBuffer);
            selectedCandidateIndex = 0; // 常に1番目の候補を初期選択状態にする
            renderCandidates();
        }

        // 15. コピー機能
        copyBtn.addEventListener('click', () => {
            const textToCopy = editor.textContent;
            
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            
            try {
                document.execCommand('copy');
                toast.classList.remove('hidden');
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 2000);
            } catch (err) {
                console.error('コピーに失敗しました。', err);
            } finally {
                document.body.removeChild(tempTextArea);
            }
        });

        // 16. クリア機能
        clearBtn.addEventListener('click', () => {
            editor.innerHTML = "";
            currentInputBuffer = "";
            hidePopup();
            editor.focus();
        });
    </script>
</body>
</html>
